name: Deploy to Remote Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем SSH для доступа на сервер
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3. Деплой на сервер
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@5.42.99.226 << EOF
            # Создаём папку проекта, если её нет
            mkdir -p /opt/Server_FastAPI
            cd /opt/Server_FastAPI

            # Устанавливаем необходимые пакеты (один раз)
            sudo apt update
            sudo apt install -y python3 python3-venv python3-pip git

            # Если репозиторий ещё не клонирован — клонируем, иначе обновляем
            if [ ! -d ".git" ]; then
              git clone https://github.com/KaRletka/Server_FastAPI.git .
            else
              git pull origin main
            fi

            # Создаём виртуальное окружение, если его нет
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Активируем виртуальное окружение и ставим зависимости
            source venv/bin/activate
            python3 -m pip install --upgrade pip
            pip install -r requirements.txt

            # Перезапуск uvicorn
            pkill -f uvicorn || true
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          EOF
